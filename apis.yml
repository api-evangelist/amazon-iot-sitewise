aid: amazon-iot-sitewise
name: Amazon IoT SiteWise
description: AWS IoT SiteWise is a managed service that makes it easy to collect, store, organize, and monitor industrial
  data at scale. It provides tools to create asset models representing your industrial operations and analyze equipment performance
  across your facilities.
