aid: amazon-iot-sitewise
name: Amazon IoT SiteWise
description: >-
  AWS IoT SiteWise is a managed service that makes it easy to collect, store,
  organize, and monitor data from industrial equipment at scale. It helps you
  make better data-driven decisions, quickly compute common industrial performance
  metrics, and create applications that analyze equipment data.
